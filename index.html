<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HWP → PDF 변환기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #38bdf8;
    --sky-dim: rgba(56,189,248,0.15);
    --purple: #a78bfa;
    --amber: #d97706;
    --surface: rgba(15,23,42,0.9);
    --border: rgba(99,179,237,0.15);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0f1e;
    min-height: 100vh;
    color: #e8eaf0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  /* Background effects */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: -30%; left: -20%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(56,189,248,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .glow-br {
    position: fixed;
    bottom: -20%; right: -10%;
    width: 50%; height: 50%;
    background: radial-gradient(ellipse, rgba(139,92,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 560px;
    backdrop-filter: blur(24px);
    position: relative;
    z-index: 1;
    box-shadow: 0 0 80px rgba(56,189,248,0.04), 0 32px 64px rgba(0,0,0,0.55);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(56,189,248,0.1);
    border: 1px solid rgba(56,189,248,0.25);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--sky);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--sky);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  h1 {
    font-size: 1.85rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, #e8eaf0 30%, var(--sky) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 0.84rem;
    color: #64748b;
    margin-bottom: 2rem;
    font-weight: 300;
  }

  /* Drop zone */
  #drop-zone {
    border: 2px dashed rgba(99,179,237,0.22);
    border-radius: 14px;
    padding: 2.2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: rgba(15,23,42,0.5);
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  #drop-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(56,189,248,0.07) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: rgba(56,189,248,0.5);
  }

  #drop-zone:hover::before, #drop-zone.drag-over::before { opacity: 1; }

  .drop-icon {
    width: 52px; height: 52px;
    margin: 0 auto 0.8rem;
    background: rgba(56,189,248,0.1);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    border: 1px solid rgba(56,189,248,0.14);
    position: relative; z-index: 1;
  }

  .drop-title {
    font-size: 0.95rem; font-weight: 500;
    color: #cbd5e1; margin-bottom: 0.3rem;
    position: relative; z-index: 1;
  }

  .drop-desc {
    font-size: 0.76rem; color: #475569;
    font-family: 'DM Mono', monospace;
    position: relative; z-index: 1;
  }

  #file-input { display: none; }

  /* File preview */
  #file-preview {
    display: none;
    align-items: center;
    gap: 1rem;
    background: rgba(56,189,248,0.05);
    border: 1px solid rgba(56,189,248,0.2);
    border-radius: 12px;
    padding: 0.875rem 1.25rem;
    margin-top: 1rem;
    animation: slideIn 0.3s ease;
  }

  #file-preview.visible { display: flex; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .file-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #1e3a5f, #0e4c7c);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }

  .file-name {
    font-size: 0.85rem; font-weight: 500;
    color: #e2e8f0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .file-size {
    font-size: 0.72rem; color: #64748b;
    font-family: 'DM Mono', monospace; margin-top: 2px;
  }

  .remove-btn {
    background: none; border: none;
    color: #475569; cursor: pointer;
    font-size: 1rem; padding: 4px;
    border-radius: 6px; transition: color 0.2s;
    flex-shrink: 0;
  }
  .remove-btn:hover { color: #ef4444; }

  /* Progress bar */
  #progress-wrap {
    display: none;
    margin-top: 1rem;
    background: rgba(56,189,248,0.06);
    border: 1px solid rgba(56,189,248,0.15);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    animation: slideIn 0.3s ease;
  }

  #progress-wrap.visible { display: block; }

  .progress-header {
    display: flex; justify-content: space-between;
    font-size: 0.78rem; color: #7dd3fc;
    margin-bottom: 0.6rem;
  }

  .progress-bar-bg {
    height: 5px;
    background: rgba(56,189,248,0.12);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #0369a1, var(--sky));
    border-radius: 100px;
    width: 0%;
    transition: width 0.4s ease;
  }

  /* Convert button */
  #convert-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.9rem;
    background: linear-gradient(135deg, #0369a1, var(--sky));
    border: none; border-radius: 12px;
    color: white;
    font-size: 0.95rem; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative; overflow: hidden;
  }

  #convert-btn::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s ease;
  }

  #convert-btn:hover:not(:disabled)::before { left: 100%; }
  #convert-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(56,189,248,0.3);
  }
  #convert-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Download box */
  #download-box {
    display: none;
    margin-top: 1rem;
    background: rgba(34,197,94,0.06);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    gap: 1rem;
    align-items: center;
    animation: slideIn 0.3s ease;
  }

  #download-box.visible { display: flex; }

  .dl-icon {
    width: 38px; height: 38px;
    background: rgba(34,197,94,0.12);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }

  .dl-info { flex: 1; }
  .dl-title { font-size: 0.85rem; font-weight: 500; color: #86efac; }
  .dl-name  { font-size: 0.72rem; color: #64748b; font-family: 'DM Mono', monospace; margin-top: 2px; }

  .dl-btn {
    padding: 0.5rem 1rem;
    background: linear-gradient(135deg, #15803d, #22c55e);
    border: none; border-radius: 8px;
    color: white; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap; flex-shrink: 0;
  }

  .dl-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,197,94,0.3); }

  /* Info steps */
  .info-box {
    margin-top: 1.25rem;
    background: rgba(139,92,246,0.05);
    border: 1px solid rgba(139,92,246,0.18);
    border-radius: 12px;
    padding: 1rem 1.25rem;
  }

  .info-step {
    display: flex; align-items: flex-start;
    gap: 0.75rem; margin-bottom: 0.6rem;
    font-size: 0.78rem; color: #94a3b8; line-height: 1.5;
  }
  .info-step:last-child { margin-bottom: 0; }

  .step-num {
    width: 18px; height: 18px;
    background: rgba(139,92,246,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.62rem; font-family: 'DM Mono', monospace;
    color: var(--purple); flex-shrink: 0; font-weight: 500;
    margin-top: 1px;
  }

  /* Error box */
  #error-box {
    display: none;
    margin-top: 1rem;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 12px;
    padding: 0.875rem 1.25rem;
    font-size: 0.82rem; color: #fca5a5;
    animation: slideIn 0.3s ease;
  }
  #error-box.visible { display: block; }

  /* ── Share Section ── */
  .divider {
    display: flex; align-items: center; gap: 0.75rem;
    margin: 1.5rem 0 1.25rem;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(99,179,237,0.1); }
  .divider-text {
    font-size: 0.68rem; font-family: 'DM Mono', monospace;
    color: #475569; letter-spacing: 0.1em; text-transform: uppercase;
  }

  .share-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.55rem;
  }

  .share-btn {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.45rem;
    padding: 0.75rem 0.2rem;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    background: rgba(255,255,255,0.025);
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative; overflow: hidden;
  }

  .share-btn:hover { transform: translateY(-3px); }
  .share-btn:active { transform: scale(0.96); }

  .s-kakao  { border-color: rgba(254,229,0,0.18); }
  .s-kakao:hover  { border-color: rgba(254,229,0,0.5);   box-shadow: 0 5px 20px rgba(254,229,0,0.1); }
  .s-gpt    { border-color: rgba(16,163,127,0.18); }
  .s-gpt:hover    { border-color: rgba(16,163,127,0.5);  box-shadow: 0 5px 20px rgba(16,163,127,0.1); }
  .s-gemini { border-color: rgba(66,133,244,0.18); }
  .s-gemini:hover { border-color: rgba(66,133,244,0.5);  box-shadow: 0 5px 20px rgba(66,133,244,0.1); }
  .s-claude { border-color: rgba(217,119,6,0.18);  }
  .s-claude:hover { border-color: rgba(217,119,6,0.5);   box-shadow: 0 5px 20px rgba(217,119,6,0.1); }
  .s-gmail  { border-color: rgba(234,67,53,0.18);  }
  .s-gmail:hover  { border-color: rgba(234,67,53,0.5);   box-shadow: 0 5px 20px rgba(234,67,53,0.1); }

  .share-logo {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }

  .share-label {
    font-size: 0.59rem; color: #64748b; font-weight: 500;
    white-space: nowrap;
  }

  .share-btn:hover .share-label { color: #94a3b8; }

  /* Toast */
  #toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(15,23,42,0.97);
    border: 1px solid rgba(99,179,237,0.28);
    border-radius: 100px;
    padding: 0.55rem 1.3rem;
    font-size: 0.8rem; color: #7dd3fc;
    backdrop-filter: blur(20px);
    z-index: 999; white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: all 0.28s ease;
  }
  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  footer {
    margin-top: 1.5rem;
    font-size: 0.68rem; color: #334155;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em; text-align: center;
  }
</style>
</head>
<body>

<div class="glow-br"></div>

<div class="card">
  <div class="badge"><span class="badge-dot"></span>HWP → PDF Converter</div>

  <h1>한글 문서를<br/>PDF로 변환</h1>
  <p class="subtitle">.hwp · .hwpx 파일을 PDF로 즉시 변환해드립니다</p>

  <!-- Drop Zone -->
  <div id="drop-zone">
    <div class="drop-icon">📄</div>
    <p class="drop-title">파일을 여기에 드래그하거나 클릭하세요</p>
    <p class="drop-desc">.hwp · .hwpx 지원</p>
  </div>
  <input type="file" id="file-input" accept=".hwp,.hwpx" />

  <!-- File Preview -->
  <div id="file-preview">
    <div class="file-icon">🇰🇷</div>
    <div class="file-info">
      <p class="file-name" id="fn"></p>
      <p class="file-size" id="fs"></p>
    </div>
    <button class="remove-btn" id="remove-btn">✕</button>
  </div>

  <!-- Progress -->
  <div id="progress-wrap">
    <div class="progress-header">
      <span id="progress-label">변환 중...</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>

  <!-- Error -->
  <div id="error-box"></div>

  <!-- Convert Button -->
  <button id="convert-btn" disabled>PDF로 변환하기</button>

  <!-- Download Box -->
  <div id="download-box">
    <div class="dl-icon">✅</div>
    <div class="dl-info">
      <p class="dl-title">변환 완료!</p>
      <p class="dl-name" id="dl-name"></p>
    </div>
    <button class="dl-btn" id="dl-btn">다운로드</button>
  </div>

  <!-- Info Steps -->
  <div class="info-box" id="info-box">
    <div class="info-step"><div class="step-num">1</div><span>위 영역에서 HWP 파일 선택</span></div>
    <div class="info-step"><div class="step-num">2</div><span>"PDF로 변환하기" 클릭</span></div>
    <div class="info-step"><div class="step-num">3</div><span>변환이 완료되면 PDF를 바로 다운로드!</span></div>
  </div>

  <!-- Share -->
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">공유하기</span>
    <div class="divider-line"></div>
  </div>

  <div class="share-grid">
    <!-- 카카오톡 -->
    <button class="share-btn s-kakao" onclick="shareKakao()" title="카카오톡으로 공유">
      <div class="share-logo" style="background:#FEE500">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#3B1D1D">
          <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.6 5.1 4.1 6.6L5 21l4.7-2.4c.75.15 1.52.23 2.3.23 5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/>
        </svg>
      </div>
      <span class="share-label">카카오톡</span>
    </button>

    <!-- ChatGPT -->
    <button class="share-btn s-gpt" onclick="shareGPT()" title="ChatGPT로 공유">
      <div class="share-logo" style="background:#10a37f">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M22.28 9.82a5.98 5.98 0 0 0-.52-4.91 6.05 6.05 0 0 0-6.51-2.9A6.07 6.07 0 0 0 4.98 4.18a5.98 5.98 0 0 0-3.998 2.9 6.05 6.05 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.91 6.05 6.05 0 0 0 6.515 2.9A5.98 5.98 0 0 0 13.26 24a6.06 6.06 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.06 6.06 0 0 0-.748-7.073zM13.26 22.43a4.48 4.48 0 0 1-2.876-1.041l.142-.08 4.778-2.758a.795.795 0 0 0 .393-.681V11.4l2.02 1.168a.07.07 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.226zm-9.66-4.125a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.758a.77.77 0 0 0 .781 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.645zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.677l5.814 3.354-2.02 1.168a.076.076 0 0 1-.071 0L3.61 13.813A4.504 4.504 0 0 1 2.34 7.896zm16.597 3.856l-5.843-3.372 2.015-1.162a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.677 8.104v-5.677a.79.79 0 0 0-.396-.684zm2.01-3.023l-.142-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.41 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zM8.307 12.863l-2.02-1.164a.08.08 0 0 1-.038-.057V6.074a4.5 4.5 0 0 1 7.376-3.454l-.142.08L8.705 5.46a.795.795 0 0 0-.393.681zm1.098-2.366l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/>
        </svg>
      </div>
      <span class="share-label">ChatGPT</span>
    </button>

    <!-- Gemini -->
    <button class="share-btn s-gemini" onclick="shareGemini()" title="Gemini로 공유">
      <div class="share-logo" style="background:#1a1a2e">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <defs>
            <linearGradient id="gm" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#4285F4"/>
              <stop offset="50%" stop-color="#9B72CB"/>
              <stop offset="100%" stop-color="#34A853"/>
            </linearGradient>
          </defs>
          <path d="M12 2C12 2 14.8 9.2 22 12C14.8 14.8 12 22 12 22C12 22 9.2 14.8 2 12C9.2 9.2 12 2 12 2Z" fill="url(#gm)"/>
        </svg>
      </div>
      <span class="share-label">Gemini</span>
    </button>

    <!-- Claude -->
    <button class="share-btn s-claude" onclick="shareClaude()" title="Claude로 공유">
      <div class="share-logo" style="background:#451a03">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="#d97706"/>
          <path d="M15 28L20 12L25 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16.5 23H23.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="share-label">Claude</span>
    </button>

    <!-- Gmail -->
    <button class="share-btn s-gmail" onclick="shareGmail()" title="Gmail로 공유">
      <div class="share-logo" style="background:#1c1c1c">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" fill="#EA4335"/>
          <path d="M2 6l10 7 10-7" stroke="#B71C1C" stroke-width="0"/>
          <path d="M4 4h16l-10 7L4 4z" fill="#EA4335"/>
          <path d="M2 6v12c0 1.1.9 2 2 2h3V9.5L2 6z" fill="#34A853"/>
          <path d="M22 6v12c0 1.1-.9 2-2 2h-3V9.5L22 6z" fill="#4285F4"/>
          <path d="M7 9.5V18h10V9.5L12 13l-5-3.5z" fill="#FBBC05"/>
        </svg>
      </div>
      <span class="share-label">Gmail</span>
    </button>
  </div>
</div>

<footer>Powered by LibreOffice · FastAPI · Claude AI</footer>
<div id="toast"></div>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const filePreview= document.getElementById('file-preview');
  const fnEl       = document.getElementById('fn');
  const fsEl       = document.getElementById('fs');
  const removeBtn  = document.getElementById('remove-btn');
  const convertBtn = document.getElementById('convert-btn');
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar  = document.getElementById('progress-bar');
  const progressPct  = document.getElementById('progress-pct');
  const progressLbl  = document.getElementById('progress-label');
  const errorBox   = document.getElementById('error-box');
  const downloadBox= document.getElementById('download-box');
  const dlName     = document.getElementById('dl-name');
  const dlBtn      = document.getElementById('dl-btn');
  const infoBox    = document.getElementById('info-box');

  let currentFile = null;
  let pdfBlob     = null;
  let pdfFileName = '';

  // ── 파일 크기 포맷 ──
  function fmtBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  // ── 파일 선택 ──
  function selectFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['hwp','hwpx'].includes(ext)) {
      showToast('⚠️ HWP 또는 HWPX 파일만 지원됩니다');
      return;
    }
    currentFile = file;
    pdfBlob = null;
    fnEl.textContent = file.name;
    fsEl.textContent = fmtBytes(file.size);
    filePreview.classList.add('visible');
    convertBtn.disabled = false;
    hideAll();
    infoBox.style.display = 'block';
  }

  function hideAll() {
    progressWrap.classList.remove('visible');
    errorBox.classList.remove('visible');
    downloadBox.classList.remove('visible');
    infoBox.style.display = 'none';
  }

  // ── 드래그 앤 드롭 ──
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    selectFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => selectFile(fileInput.files[0]));

  // ── 파일 제거 ──
  removeBtn.addEventListener('click', () => {
    currentFile = null; pdfBlob = null;
    filePreview.classList.remove('visible');
    convertBtn.disabled = true;
    fileInput.value = '';
    hideAll();
    infoBox.style.display = 'block';
  });

  // ── 변환 ──
  convertBtn.addEventListener('click', async () => {
    if (!currentFile) return;

    hideAll();
    progressWrap.classList.add('visible');
    convertBtn.disabled = true;
    progressBar.style.width = '0%';
    progressPct.textContent = '0%';
    progressLbl.textContent = '변환 중...';

    // 가짜 진행 애니메이션 (실제 progress는 fetch로 불가)
    let fakeProgress = 0;
    const interval = setInterval(() => {
      if (fakeProgress < 85) {
        fakeProgress += Math.random() * 8;
        progressBar.style.width = Math.min(fakeProgress, 85) + '%';
        progressPct.textContent = Math.floor(Math.min(fakeProgress, 85)) + '%';
      }
    }, 300);

    try {
      const formData = new FormData();
      formData.append('file', currentFile);

      const res = await fetch('/convert', { method: 'POST', body: formData });

      clearInterval(interval);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: '변환 실패' }));
        throw new Error(err.detail || '서버 오류');
      }

      progressBar.style.width = '100%';
      progressPct.textContent = '100%';
      progressLbl.textContent = '완료!';

      pdfBlob = await res.blob();
      pdfFileName = currentFile.name.replace(/\.[^.]+$/, '') + '.pdf';

      setTimeout(() => {
        progressWrap.classList.remove('visible');
        dlName.textContent = pdfFileName;
        downloadBox.classList.add('visible');
        convertBtn.disabled = false;
        convertBtn.textContent = '다시 변환하기';
        showToast('✓ 변환 완료! PDF를 다운로드하세요.');
      }, 600);

    } catch (err) {
      clearInterval(interval);
      progressWrap.classList.remove('visible');
      errorBox.textContent = '❌ ' + err.message;
      errorBox.classList.add('visible');
      convertBtn.disabled = false;
    }
  });

  // ── 다운로드 ──
  dlBtn.addEventListener('click', () => {
    if (!pdfBlob) return;
    const url = URL.createObjectURL(pdfBlob);
    const a = document.createElement('a');
    a.href = url; a.download = pdfFileName;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 다운로드 시작!');
  });

  // ── 공유 함수들 ──
  function shareMsg() {
    const name = pdfFileName || (currentFile ? currentFile.name.replace(/\.[^.]+$/, '.pdf') : '문서.pdf');
    return `📄 "${name}" 파일을 HWP → PDF 변환기로 변환했습니다!\n\nHWP 파일이 있다면 로컬 변환 서버를 이용해보세요.`;
  }

  function shareKakao() {
    navigator.clipboard?.writeText(shareMsg()).catch(()=>{});
    window.open('https://web.kakao.com', '_blank');
    showToast('✓ 카카오톡 열림 · 텍스트 복사됨');
  }

  function shareGPT() {
    navigator.clipboard?.writeText(shareMsg()).catch(()=>{});
    window.open('https://chatgpt.com/', '_blank');
    showToast('✓ ChatGPT 열림 · 텍스트 복사됨');
  }

  function shareGemini() {
    window.open('https://gemini.google.com/app?q=' + encodeURIComponent(shareMsg()), '_blank');
    showToast('✓ Gemini로 공유됨');
  }

  function shareClaude() {
    window.open('https://claude.ai/new?q=' + encodeURIComponent(shareMsg()), '_blank');
    showToast('✓ Claude로 공유됨');
  }

  function shareGmail() {
    const sub = encodeURIComponent('[공유] ' + (pdfFileName || '변환된 PDF'));
    const body = encodeURIComponent(shareMsg());
    window.open('https://mail.google.com/mail/?view=cm&su=' + sub + '&body=' + body, '_blank');
    showToast('✓ Gmail 작성창 열림');
  }

  // ── 토스트 ──
  let toastTimer;
  const toastEl = document.getElementById('toast');

  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }
</script>
</body>
</html>
